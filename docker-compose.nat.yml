services:
  relay:
    image: p2p-api-tunnel-tubo:nat
    build:
      context: .
      dockerfile: deploy/Dockerfile.tubo
    command: ["relay", "run", "--listen", "/ip4/0.0.0.0/tcp/4002", "--seed", "relay-demo-seed"]
    environment:
      RELAY_HEALTH_LISTEN: ":8092"
      ENABLE_RELAY_SERVICE: "true"
      ENABLE_AUTONAT_SERVICE: "true"
      ENABLE_DISCOVERY_PUBSUB: "true"
      FORCE_REACHABILITY_PUBLIC: "true"
      RELAY_LIMIT_DATA_BYTES: "268435456"
      RELAY_MAX_CIRCUITS: "64"
      PRINT_RUN_COMMANDS: "false"
    ports:
      - "8092:8092"
    networks:
      - edge-private
      - service-private

  dummy-api-server:
    image: p2p-api-tunnel-dummy-api-server:nat
    build:
      context: .
      dockerfile: deploy/Dockerfile.dummy-api-server
    environment:
      DUMMY_API_LISTEN: "0.0.0.0:8000"
    ports:
      - "8000:8000"
    networks:
      - service-private
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8000/healthz >/dev/null 2>&1"]
      interval: 3s
      timeout: 2s
      retries: 20

  edge:
    image: p2p-api-tunnel-tubo:nat
    build:
      context: .
      dockerfile: deploy/Dockerfile.tubo
    depends_on:
      - relay
    command:
      - edge
      - run
      - --listen
      - :8443
      - --admin-listen
      - :8444
      - --p2p-listen
      - /ip4/0.0.0.0/tcp/4001
      - --seed
      - edge-demo-seed
      - --bootstrap
      - /dns4/relay/tcp/4002/p2p/12D3KooWCM2WEy79ibaqQKsM3YK46WKvQBQSE3hd21dzcmhvf4ic
      - --relay
      - /dns4/relay/tcp/4002/p2p/12D3KooWCM2WEy79ibaqQKsM3YK46WKvQBQSE3hd21dzcmhvf4ic
    ports:
      - "8443:8443"
      - "8444:8444"
    networks:
      - edge-private

  service:
    image: p2p-api-tunnel-tubo:nat
    build:
      context: .
      dockerfile: deploy/Dockerfile.tubo
    depends_on:
      - dummy-api-server
      - edge
      - relay
    command:
      - service
      - run
      - --name
      - myapi
      - --target
      - http://dummy-api-server:8000
      - --p2p-listen
      - /ip4/0.0.0.0/tcp/40123
      - --seed
      - service-demo-seed
      - --heartbeat-interval
      - 5s
      - --bootstrap
      - /dns4/relay/tcp/4002/p2p/12D3KooWCM2WEy79ibaqQKsM3YK46WKvQBQSE3hd21dzcmhvf4ic
      - --relay
      - /dns4/relay/tcp/4002/p2p/12D3KooWCM2WEy79ibaqQKsM3YK46WKvQBQSE3hd21dzcmhvf4ic
    environment:
      SERVICE_HEALTH_LISTEN: ":8091"
      ENABLE_AUTORELAY: "true"
      ENABLE_HOLE_PUNCHING: "true"
      FORCE_REACHABILITY_PRIVATE: "true"
    ports:
      - "8091:8091"
    networks:
      - service-private

networks:
  edge-private:
    driver: bridge
  service-private:
    driver: bridge
