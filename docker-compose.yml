services:
  relay:
    image: tubo:dev
    build:
      context: .
      dockerfile: deploy/Dockerfile.tubo
    command:
      - relay
      - --listen
      - /ip4/0.0.0.0/tcp/4002
      - --seed
      - relay-demo-seed
    environment:
      RELAY_HEALTH_LISTEN: ":8092"
      ENABLE_RELAY_SERVICE: "true"
      ENABLE_AUTONAT_SERVICE: "true"
      ENABLE_DISCOVERY_PUBSUB: "true"
      FORCE_REACHABILITY_PUBLIC: "true"
      PRINT_RUN_COMMANDS: "false"
    ports:
      - "4002:4002"
      - "8092:8092"

  dummy-api-server:
    image: tubo-dummy-api-server:dev
    build:
      context: .
      dockerfile: deploy/Dockerfile.dummy-api-server
    environment:
      DUMMY_API_LISTEN: "0.0.0.0:8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8000/healthz >/dev/null 2>&1"]
      interval: 3s
      timeout: 2s
      retries: 20

  edge:
    image: tubo:dev
    build:
      context: .
      dockerfile: deploy/Dockerfile.tubo
    command:
      - gateway
      - --listen
      - :8443
      - --admin-listen
      - :8444
      - --p2p-listen
      - /ip4/0.0.0.0/tcp/4001
      - --seed
      - edge-demo-seed
      - --relay
      - /dns4/relay/tcp/4002/p2p/12D3KooWCM2WEy79ibaqQKsM3YK46WKvQBQSE3hd21dzcmhvf4ic
    depends_on:
      - relay
    ports:
      - "8443:8443"
      - "8444:8444"
      - "4001:4001"

  service:
    image: tubo:dev
    build:
      context: .
      dockerfile: deploy/Dockerfile.tubo
    depends_on:
      - dummy-api-server
      - edge
      - relay
    command:
      - attach
      - --name
      - myapi
      - --target
      - http://dummy-api-server:8000
      - --p2p-listen
      - /ip4/0.0.0.0/tcp/40123
      - --seed
      - service-demo-seed
      - --heartbeat-interval
      - 5s
      - --bootstrap
      - /dns4/edge/tcp/4001/p2p/12D3KooWCtTtxCJ1LLi8nJE7Q8S1h4zEuh9a9fp5Tn3mxwyFFvUR,/dns4/relay/tcp/4002/p2p/12D3KooWCM2WEy79ibaqQKsM3YK46WKvQBQSE3hd21dzcmhvf4ic
    environment:
      SERVICE_HEALTH_LISTEN: ":8091"
    ports:
      - "8091:8091"
      - "40123:40123"
