services:
  relay:
    image: tubo:dev
    build:
      context: .
      dockerfile: deploy/Dockerfile.tubo
    command: ["relay", "--config", "/home/nonroot/.config/tubo/relay.yaml"]
    volumes:
      - ./generated/integration/tubo:/home/nonroot/.config/tubo:ro
    environment:
      ENABLE_RELAY_SERVICE: "true"
      ENABLE_AUTONAT_SERVICE: "true"
      ENABLE_DISCOVERY_PUBSUB: "true"
      FORCE_REACHABILITY_PUBLIC: "true"
      PRINT_RUN_COMMANDS: "false"
    ports:
      - "4002:4002"
      - "8092:8092"

  dummy-api-server:
    image: tubo-dummy-api-server:dev
    build:
      context: .
      dockerfile: deploy/Dockerfile.dummy-api-server
    environment:
      DUMMY_API_LISTEN: "0.0.0.0:8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8000/healthz >/dev/null 2>&1"]
      interval: 3s
      timeout: 2s
      retries: 20

  edge:
    image: tubo:dev
    build:
      context: .
      dockerfile: deploy/Dockerfile.tubo
    command: ["gateway", "--config", "/home/nonroot/.config/tubo/edge.yaml"]
    depends_on:
      - relay
    volumes:
      - ./generated/integration/tubo:/home/nonroot/.config/tubo:ro
    ports:
      - "8443:8443"
      - "8444:8444"
      - "4001:4001"

  service:
    image: tubo:dev
    build:
      context: .
      dockerfile: deploy/Dockerfile.tubo
    depends_on:
      - dummy-api-server
      - edge
      - relay
    command: ["attach", "--config", "/home/nonroot/.config/tubo/service.yaml"]
    volumes:
      - ./generated/integration/tubo:/home/nonroot/.config/tubo:ro
    environment:
      SERVICE_HEALTH_LISTEN: ":8091"
    ports:
      - "8091:8091"
      - "40123:40123"
