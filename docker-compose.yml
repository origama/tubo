services:
  dummy-api-server:
    image: p2p-api-tunnel-dummy-api-server:dev
    build:
      context: .
      dockerfile: deploy/Dockerfile.dummy-api-server
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DUMMY_API_LISTEN: "127.0.0.1:8000"

  connector:
    image: p2p-api-tunnel-connector:dev
    build:
      context: .
      dockerfile: deploy/Dockerfile.service-agent
    environment:
      CONNECTOR_ORIGIN_ADDR: "http://dummy-api-server:8000"
      CONNECTOR_SERVICE_ID: "myapi"
      CONNECTOR_NODE_SEED: "connector-demo-seed"
      CONNECTOR_PUBSUB_TOPIC: "/p2p-tunnel/discovery/v1"
      BOOTSTRAP_PEERS: "/dns4/bootstrap/tcp/4001/p2p/${BOOTSTRAP_PEER_ID}"
    depends_on:
      - dummy-api-server
      - bootstrap

  edge-gateway:
    image: p2p-api-tunnel-edge-gateway:dev
    build:
      context: .
      dockerfile: deploy/Dockerfile.edge-gateway
    ports:
      - "8443:8443"
    environment:
      EDGE_LISTEN: ":8443"
      EDGE_NODE_SEED: "edge-demo-seed"
      EDGE_PUBSUB_TOPIC: "/p2p-tunnel/discovery/v1"
      BOOTSTRAP_PEERS: "/dns4/bootstrap/tcp/4001/p2p/${BOOTSTRAP_PEER_ID}"
    depends_on:
      - bootstrap

  relay:
    image: p2p-api-tunnel-relay:dev
    build:
      context: .
      dockerfile: deploy/Dockerfile.relay
    ports:
      - "4002:4002"

  bootstrap:
    image: p2p-api-tunnel-bootstrap:dev
    build:
      context: .
      dockerfile: deploy/Dockerfile.bootstrap
    ports:
      - "4001:4001"

  client-bridge:
    image: p2p-api-tunnel-client-bridge:dev
    build:
      context: .
      dockerfile: deploy/Dockerfile.client-bridge
    environment:
      CLIENT_NODE_SEED: "client-demo-seed"
      CLIENT_PUBSUB_TOPIC: "/p2p-tunnel/discovery/v1"
      BOOTSTRAP_PEERS: "/dns4/bootstrap/tcp/4001/p2p/${BOOTSTRAP_PEER_ID}"
    depends_on:
      - bootstrap
