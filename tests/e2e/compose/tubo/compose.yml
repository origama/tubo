services:
  relay:
    image: tubo:dev
    build:
      context: ${TUBO_REPO_ROOT}
      dockerfile: deploy/Dockerfile.tubo
    command: ["relay", "--config", "/home/nonroot/.config/tubo/relay.yaml"]
    volumes:
      - ${TUBO_REPO_ROOT}/generated/integration/tubo:/home/nonroot/.config/tubo:ro
    ports:
      - "4002:4002"
      - "8092:8092"

  dummy-api-server:
    image: tubo-dummy-api-server:dev
    build:
      context: ${TUBO_REPO_ROOT}
      dockerfile: deploy/Dockerfile.dummy-api-server
    environment:
      DUMMY_API_LISTEN: "0.0.0.0:8000"
    ports:
      - "8000:8000"

  edge:
    image: tubo:dev
    build:
      context: ${TUBO_REPO_ROOT}
      dockerfile: deploy/Dockerfile.tubo
    command: ["gateway", "--config", "/home/nonroot/.config/tubo/edge.yaml"]
    volumes:
      - ${TUBO_REPO_ROOT}/generated/integration/tubo:/home/nonroot/.config/tubo:ro
    ports:
      - "8443:8443"
      - "8444:8444"
      - "4001:4001"

  service:
    image: tubo:dev
    build:
      context: ${TUBO_REPO_ROOT}
      dockerfile: deploy/Dockerfile.tubo
    depends_on:
      - dummy-api-server
      - edge
      - relay
    command: ["attach", "--config", "/home/nonroot/.config/tubo/service.yaml"]
    volumes:
      - ${TUBO_REPO_ROOT}/generated/integration/tubo:/home/nonroot/.config/tubo:ro
    ports:
      - "8091:8091"
      - "40123:40123"
