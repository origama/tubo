services:
  tubo-relay:
    image: tubo:dev
    user: "${TUBO_SMOKE_UID:-65532}:${TUBO_SMOKE_GID:-65532}"
    environment:
      HOME: /config
      XDG_CONFIG_HOME: /config
      XDG_DATA_HOME: /tmp
    build:
      context: ${TUBO_REPO_ROOT}
      dockerfile: deploy/Dockerfile.tubo
    command: ["relay", "--config", "/config/tubo/relay.yaml"]
    volumes:
      - ${TUBO_REPO_ROOT}/generated/tubo-workflow/tubo:/config/tubo:ro
    ports:
      - "${TUBO_SMOKE_RELAY_PORT:-4002}:4002"
      - "${TUBO_SMOKE_RELAY_HEALTH_PORT:-8092}:8092"

  tubo-dummy-api-server:
    image: tubo-dummy-api-server:dev
    build:
      context: ${TUBO_REPO_ROOT}
      dockerfile: deploy/Dockerfile.dummy-api-server
    environment:
      DUMMY_API_LISTEN: "0.0.0.0:8000"
    ports:
      - "${TUBO_SMOKE_DUMMY_API_PORT:-8000}:8000"

  tubo-edge:
    image: tubo:dev
    user: "${TUBO_SMOKE_UID:-65532}:${TUBO_SMOKE_GID:-65532}"
    environment:
      HOME: /config
      XDG_CONFIG_HOME: /config
      XDG_DATA_HOME: /tmp
    build:
      context: ${TUBO_REPO_ROOT}
      dockerfile: deploy/Dockerfile.tubo
    command: ["gateway", "--config", "/config/tubo/edge.yaml"]
    volumes:
      - ${TUBO_REPO_ROOT}/generated/tubo-workflow/tubo:/config/tubo:ro
    ports:
      - "${TUBO_SMOKE_EDGE_HTTP_PORT:-8443}:8443"
      - "${TUBO_SMOKE_EDGE_ADMIN_PORT:-8444}:8444"
      - "${TUBO_SMOKE_EDGE_P2P_PORT:-4001}:4001"

  tubo-service-a:
    image: tubo:dev
    user: "${TUBO_SMOKE_UID:-65532}:${TUBO_SMOKE_GID:-65532}"
    environment:
      HOME: /config
      XDG_CONFIG_HOME: /config
      XDG_DATA_HOME: /tmp
    build:
      context: ${TUBO_REPO_ROOT}
      dockerfile: deploy/Dockerfile.tubo
    depends_on:
      - tubo-dummy-api-server
      - tubo-edge
      - tubo-relay
    command: ["attach", "--config", "/config/tubo/service-tenant-a.yaml"]
    volumes:
      - ${TUBO_REPO_ROOT}/generated/tubo-workflow/tubo:/config/tubo:ro
    ports:
      - "${TUBO_SMOKE_SERVICE_A_HEALTH_PORT:-8091}:8091"
      - "${TUBO_SMOKE_SERVICE_A_P2P_PORT:-40123}:40123"

  tubo-service-b:
    image: tubo:dev
    user: "${TUBO_SMOKE_UID:-65532}:${TUBO_SMOKE_GID:-65532}"
    environment:
      HOME: /config
      XDG_CONFIG_HOME: /config
      XDG_DATA_HOME: /tmp
    build:
      context: ${TUBO_REPO_ROOT}
      dockerfile: deploy/Dockerfile.tubo
    depends_on:
      - tubo-dummy-api-server
      - tubo-edge
      - tubo-relay
    command: ["attach", "--config", "/config/tubo/service-tenant-b.yaml"]
    volumes:
      - ${TUBO_REPO_ROOT}/generated/tubo-workflow/tubo:/config/tubo:ro
    ports:
      - "${TUBO_SMOKE_SERVICE_B_HEALTH_PORT:-8093}:8093"
      - "${TUBO_SMOKE_SERVICE_B_P2P_PORT:-40124}:40124"
