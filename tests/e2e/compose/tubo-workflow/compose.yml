services:
  tubo-relay:
    image: tubo:dev
    user: "${TUBO_SMOKE_UID:-65532}:${TUBO_SMOKE_GID:-65532}"
    environment:
      HOME: /config
      XDG_CONFIG_HOME: /config
      XDG_DATA_HOME: /tmp
    build:
      context: ${TUBO_REPO_ROOT}
      dockerfile: deploy/Dockerfile.tubo
    command: ["relay", "--config", "/config/tubo/relay.yaml"]
    volumes:
      - ${TUBO_REPO_ROOT}/generated/tubo-workflow/tubo:/config/tubo:ro
    ports:
      - "4002:4002"
      - "8092:8092"

  tubo-dummy-api-server:
    image: tubo-dummy-api-server:dev
    build:
      context: ${TUBO_REPO_ROOT}
      dockerfile: deploy/Dockerfile.dummy-api-server
    environment:
      DUMMY_API_LISTEN: "0.0.0.0:8000"
    ports:
      - "8000:8000"

  tubo-edge:
    image: tubo:dev
    user: "${TUBO_SMOKE_UID:-65532}:${TUBO_SMOKE_GID:-65532}"
    environment:
      HOME: /config
      XDG_CONFIG_HOME: /config
      XDG_DATA_HOME: /tmp
    build:
      context: ${TUBO_REPO_ROOT}
      dockerfile: deploy/Dockerfile.tubo
    command: ["gateway", "--config", "/config/tubo/edge.yaml"]
    volumes:
      - ${TUBO_REPO_ROOT}/generated/tubo-workflow/tubo:/config/tubo:ro
    ports:
      - "8443:8443"
      - "8444:8444"
      - "4001:4001"

  tubo-service-a:
    image: tubo:dev
    user: "${TUBO_SMOKE_UID:-65532}:${TUBO_SMOKE_GID:-65532}"
    environment:
      HOME: /config
      XDG_CONFIG_HOME: /config
      XDG_DATA_HOME: /tmp
    build:
      context: ${TUBO_REPO_ROOT}
      dockerfile: deploy/Dockerfile.tubo
    depends_on:
      - tubo-dummy-api-server
      - tubo-edge
      - tubo-relay
    command: ["attach", "--config", "/config/tubo/service-tenant-a.yaml"]
    volumes:
      - ${TUBO_REPO_ROOT}/generated/tubo-workflow/tubo:/config/tubo:ro
    ports:
      - "8091:8091"
      - "40123:40123"

  tubo-service-b:
    image: tubo:dev
    user: "${TUBO_SMOKE_UID:-65532}:${TUBO_SMOKE_GID:-65532}"
    environment:
      HOME: /config
      XDG_CONFIG_HOME: /config
      XDG_DATA_HOME: /tmp
    build:
      context: ${TUBO_REPO_ROOT}
      dockerfile: deploy/Dockerfile.tubo
    depends_on:
      - tubo-dummy-api-server
      - tubo-edge
      - tubo-relay
    command: ["attach", "--config", "/config/tubo/service-tenant-b.yaml"]
    volumes:
      - ${TUBO_REPO_ROOT}/generated/tubo-workflow/tubo:/config/tubo:ro
    ports:
      - "8093:8093"
      - "40124:40124"
