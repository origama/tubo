services:
  relay:
    image: tubo:nat
    build:
      context: ${TUBO_REPO_ROOT}
      dockerfile: deploy/Dockerfile.tubo
    command: ["relay", "--config", "/home/nonroot/.config/tubo/relay.yaml"]
    volumes:
      - ${TUBO_REPO_ROOT}/generated/integration/tubo:/home/nonroot/.config/tubo:ro
    environment:
      ENABLE_RELAY_SERVICE: "true"
      ENABLE_AUTONAT_SERVICE: "true"
      ENABLE_DISCOVERY_PUBSUB: "true"
      FORCE_REACHABILITY_PUBLIC: "true"
      RELAY_LIMIT_DATA_BYTES: "268435456"
      RELAY_MAX_CIRCUITS: "64"
      PRINT_RUN_COMMANDS: "false"
    ports:
      - "8092:8092"
    networks:
      - edge-private
      - service-private

  dummy-api-server:
    image: tubo-dummy-api-server:nat
    build:
      context: ${TUBO_REPO_ROOT}
      dockerfile: deploy/Dockerfile.dummy-api-server
    environment:
      DUMMY_API_LISTEN: "0.0.0.0:8000"
    ports:
      - "8000:8000"
    networks:
      - service-private
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8000/healthz >/dev/null 2>&1"]
      interval: 3s
      timeout: 2s
      retries: 20

  edge:
    image: tubo:nat
    build:
      context: ${TUBO_REPO_ROOT}
      dockerfile: deploy/Dockerfile.tubo
    depends_on:
      - relay
    command: ["gateway", "--config", "/home/nonroot/.config/tubo/edge.yaml"]
    volumes:
      - ${TUBO_REPO_ROOT}/generated/integration/tubo:/home/nonroot/.config/tubo:ro
    ports:
      - "8443:8443"
      - "8444:8444"
    networks:
      - edge-private

  service:
    image: tubo:nat
    build:
      context: ${TUBO_REPO_ROOT}
      dockerfile: deploy/Dockerfile.tubo
    depends_on:
      - dummy-api-server
      - edge
      - relay
    command: ["attach", "--config", "/home/nonroot/.config/tubo/service.yaml"]
    volumes:
      - ${TUBO_REPO_ROOT}/generated/integration/tubo:/home/nonroot/.config/tubo:ro
    environment:
      SERVICE_HEALTH_LISTEN: ":8091"
      ENABLE_AUTORELAY: "true"
      ENABLE_HOLE_PUNCHING: "true"
      FORCE_REACHABILITY_PRIVATE: "true"
    ports:
      - "8091:8091"
    networks:
      - service-private

networks:
  edge-private:
    driver: bridge
  service-private:
    driver: bridge
