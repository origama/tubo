services:
  p2p-relay:
    image: p2p-api-tunnel-relay:private-multi
    build:
      context: .
      dockerfile: deploy/Dockerfile.relay
    environment:
      P2P_LISTEN: "/ip4/0.0.0.0/tcp/4002"
      NODE_SEED: "relay-demo-seed"
      RELAY_HEALTH_LISTEN: ":8092"
      ENABLE_RELAY_SERVICE: "true"
      ENABLE_AUTONAT_SERVICE: "true"
      ENABLE_DISCOVERY_PUBSUB: "true"
      FORCE_REACHABILITY_PUBLIC: "true"
      RELAY_LIMIT_DATA_BYTES: "16777216"
      RELAY_MAX_CIRCUITS: "128"
      LIBP2P_PRIVATE_NETWORK_KEY_B64: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
    networks:
      - edge-private
      - service-one-private
      - service-two-private
      - service-three-private
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8092/healthz >/dev/null 2>&1"]
      interval: 3s
      timeout: 2s
      retries: 20

  edge-gateway:
    image: p2p-api-tunnel-edge-gateway:private-multi
    build:
      context: .
      dockerfile: deploy/Dockerfile.edge-gateway
    depends_on:
      p2p-relay:
        condition: service_healthy
    environment:
      EDGE_LISTEN: ":8443"
      EDGE_ADMIN_LISTEN: ":8444"
      EDGE_P2P_LISTEN: "/ip4/0.0.0.0/tcp/4001"
      EDGE_SEED: "edge-demo-seed"
      BOOTSTRAP_PEERS: "/dns4/p2p-relay/tcp/4002/p2p/12D3KooWCM2WEy79ibaqQKsM3YK46WKvQBQSE3hd21dzcmhvf4ic"
      RELAY_PEERS: "/dns4/p2p-relay/tcp/4002/p2p/12D3KooWCM2WEy79ibaqQKsM3YK46WKvQBQSE3hd21dzcmhvf4ic"
      LIBP2P_PRIVATE_NETWORK_KEY_B64: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
    ports:
      - "8443:8443"
      - "8444:8444"
    networks:
      - edge-private
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8443/healthz >/dev/null 2>&1"]
      interval: 3s
      timeout: 2s
      retries: 20

  curl-client:
    image: curlimages/curl:8.16.0
    depends_on:
      edge-gateway:
        condition: service_healthy
    command: ["sh", "-c", "sleep infinity"]
    networks:
      - edge-private

  dummy-api-server-one:
    image: p2p-api-tunnel-dummy-api-server:private-multi
    build:
      context: .
      dockerfile: deploy/Dockerfile.dummy-api-server
    environment:
      DUMMY_API_LISTEN: "0.0.0.0:8000"
      DUMMY_API_INSTANCE: "svc-one"
    networks:
      - service-one-private
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8000/healthz >/dev/null 2>&1"]
      interval: 3s
      timeout: 2s
      retries: 20

  service-agent-one:
    image: p2p-api-tunnel-service-agent:private-multi
    build:
      context: .
      dockerfile: deploy/Dockerfile.service-agent
    depends_on:
      dummy-api-server-one:
        condition: service_healthy
      edge-gateway:
        condition: service_healthy
      p2p-relay:
        condition: service_healthy
    environment:
      SERVICE_P2P_LISTEN: "/ip4/0.0.0.0/tcp/40123"
      SERVICE_TARGET: "http://dummy-api-server-one:8000"
      NODE_SEED: "service-one-demo-seed"
      SERVICE_NAME: "svc-one"
      HEARTBEAT_INTERVAL: "5s"
      SERVICE_HEALTH_LISTEN: ":8091"
      BOOTSTRAP_PEERS: "/dns4/p2p-relay/tcp/4002/p2p/12D3KooWCM2WEy79ibaqQKsM3YK46WKvQBQSE3hd21dzcmhvf4ic"
      RELAY_PEERS: "/dns4/p2p-relay/tcp/4002/p2p/12D3KooWCM2WEy79ibaqQKsM3YK46WKvQBQSE3hd21dzcmhvf4ic"
      ENABLE_AUTORELAY: "true"
      ENABLE_HOLE_PUNCHING: "true"
      FORCE_REACHABILITY_PRIVATE: "true"
      LIBP2P_PRIVATE_NETWORK_KEY_B64: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
    networks:
      - service-one-private
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8091/healthz >/dev/null 2>&1"]
      interval: 3s
      timeout: 2s
      retries: 20

  dummy-api-server-two:
