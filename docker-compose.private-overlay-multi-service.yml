x-service-env: &service-env
  SERVICE_HEALTH_LISTEN: ":8091"
  ENABLE_AUTORELAY: "true"
  ENABLE_HOLE_PUNCHING: "true"
  FORCE_REACHABILITY_PRIVATE: "true"
  LIBP2P_PRIVATE_NETWORK_KEY_B64: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="

services:
  relay:
    image: p2p-api-tunnel-tubo:private-multi
    build:
      context: .
      dockerfile: deploy/Dockerfile.tubo
    command: ["relay", "run", "--listen", "/ip4/0.0.0.0/tcp/4002", "--seed", "relay-demo-seed"]
    environment:
      RELAY_HEALTH_LISTEN: ":8092"
      ENABLE_RELAY_SERVICE: "true"
      ENABLE_AUTONAT_SERVICE: "true"
      ENABLE_DISCOVERY_PUBSUB: "true"
      FORCE_REACHABILITY_PUBLIC: "true"
      RELAY_LIMIT_DATA_BYTES: "268435456"
      RELAY_MAX_CIRCUITS: "128"
      PRINT_RUN_COMMANDS: "false"
      LIBP2P_PRIVATE_NETWORK_KEY_B64: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
    networks:
      - edge-private
      - service-one-private
      - service-two-private
      - service-three-private

  edge:
    image: p2p-api-tunnel-tubo:private-multi
    build:
      context: .
      dockerfile: deploy/Dockerfile.tubo
    depends_on:
      - relay
    command:
      - edge
      - run
      - --listen
      - :8443
      - --admin-listen
      - :8444
      - --p2p-listen
      - /ip4/0.0.0.0/tcp/4001
      - --seed
      - edge-demo-seed
      - --bootstrap
      - /dns4/relay/tcp/4002/p2p/12D3KooWCM2WEy79ibaqQKsM3YK46WKvQBQSE3hd21dzcmhvf4ic
      - --relay
      - /dns4/relay/tcp/4002/p2p/12D3KooWCM2WEy79ibaqQKsM3YK46WKvQBQSE3hd21dzcmhvf4ic
    environment:
      LIBP2P_PRIVATE_NETWORK_KEY_B64: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
    ports:
      - "8443:8443"
      - "8444:8444"
    networks:
      - edge-private

  curl-client:
    image: curlimages/curl:8.16.0
    depends_on:
      - edge
    command: ["sh", "-c", "sleep infinity"]
    networks:
      - edge-private

  dummy-api-server-one:
    image: p2p-api-tunnel-dummy-api-server:private-multi
    build:
      context: .
      dockerfile: deploy/Dockerfile.dummy-api-server
    environment:
      DUMMY_API_LISTEN: "0.0.0.0:8000"
      DUMMY_API_INSTANCE: "svc-one"
    networks:
      - service-one-private
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8000/healthz >/dev/null 2>&1"]
      interval: 3s
      timeout: 2s
      retries: 20

  service-one:
    image: p2p-api-tunnel-tubo:private-multi
    build:
      context: .
      dockerfile: deploy/Dockerfile.tubo
    depends_on:
      - dummy-api-server-one
      - edge
      - relay
    command:
      - service
      - run
      - --p2p-listen
      - /ip4/0.0.0.0/tcp/40123
      - --heartbeat-interval
      - 5s
      - --bootstrap
      - /dns4/relay/tcp/4002/p2p/12D3KooWCM2WEy79ibaqQKsM3YK46WKvQBQSE3hd21dzcmhvf4ic
      - --relay
      - /dns4/relay/tcp/4002/p2p/12D3KooWCM2WEy79ibaqQKsM3YK46WKvQBQSE3hd21dzcmhvf4ic
      - --name
      - svc-one
      - --target
      - http://dummy-api-server-one:8000
      - --seed
      - service-one-demo-seed
    environment: *service-env
    networks:
      - service-one-private

  dummy-api-server-two:
    image: p2p-api-tunnel-dummy-api-server:private-multi
    build:
      context: .
      dockerfile: deploy/Dockerfile.dummy-api-server
    environment:
      DUMMY_API_LISTEN: "0.0.0.0:8000"
      DUMMY_API_INSTANCE: "svc-two"
    networks:
      - service-two-private
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8000/healthz >/dev/null 2>&1"]
      interval: 3s
      timeout: 2s
      retries: 20

  service-two:
    image: p2p-api-tunnel-tubo:private-multi
    build:
      context: .
      dockerfile: deploy/Dockerfile.tubo
    depends_on:
      - dummy-api-server-two
      - edge
      - relay
    command:
      - service
      - run
      - --p2p-listen
      - /ip4/0.0.0.0/tcp/40123
      - --heartbeat-interval
      - 5s
      - --bootstrap
      - /dns4/relay/tcp/4002/p2p/12D3KooWCM2WEy79ibaqQKsM3YK46WKvQBQSE3hd21dzcmhvf4ic
      - --relay
      - /dns4/relay/tcp/4002/p2p/12D3KooWCM2WEy79ibaqQKsM3YK46WKvQBQSE3hd21dzcmhvf4ic
      - --name
      - svc-two
      - --target
      - http://dummy-api-server-two:8000
      - --seed
      - service-two-demo-seed
    environment: *service-env
    networks:
      - service-two-private

  dummy-api-server-three:
    image: p2p-api-tunnel-dummy-api-server:private-multi
    build:
      context: .
      dockerfile: deploy/Dockerfile.dummy-api-server
    environment:
      DUMMY_API_LISTEN: "0.0.0.0:8000"
      DUMMY_API_INSTANCE: "svc-three"
    networks:
      - service-three-private
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8000/healthz >/dev/null 2>&1"]
      interval: 3s
      timeout: 2s
      retries: 20

  service-three:
    image: p2p-api-tunnel-tubo:private-multi
    build:
      context: .
      dockerfile: deploy/Dockerfile.tubo
    depends_on:
      - dummy-api-server-three
      - edge
      - relay
    command:
      - service
      - run
      - --p2p-listen
      - /ip4/0.0.0.0/tcp/40123
      - --heartbeat-interval
      - 5s
      - --bootstrap
      - /dns4/relay/tcp/4002/p2p/12D3KooWCM2WEy79ibaqQKsM3YK46WKvQBQSE3hd21dzcmhvf4ic
      - --relay
      - /dns4/relay/tcp/4002/p2p/12D3KooWCM2WEy79ibaqQKsM3YK46WKvQBQSE3hd21dzcmhvf4ic
      - --name
      - svc-three
      - --target
      - http://dummy-api-server-three:8000
      - --seed
      - service-three-demo-seed
    environment: *service-env
    networks:
      - service-three-private

networks:
  edge-private:
    driver: bridge
    internal: true
  service-one-private:
    driver: bridge
    internal: true
  service-two-private:
    driver: bridge
    internal: true
  service-three-private:
    driver: bridge
    internal: true
