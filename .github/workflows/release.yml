name: Release assets

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v0.1.3"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-assets-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      version: ${{ steps.vars.outputs.version }}
      commit: ${{ steps.vars.outputs.commit }}
      build_date: ${{ steps.vars.outputs.build_date }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: vars
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$GITHUB_REF_NAME"
          fi

          case "$TAG" in
            v*.*.*) ;;
            *)
              echo "::error::release tag must match vX.Y.Z"
              exit 1
              ;;
          esac

          git fetch --force --tags origin
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::tag $TAG does not exist"
            exit 1
          fi

          VERSION="${TAG#v}"
          COMMIT="$(git rev-list -n 1 "$TAG")"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and package ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          COMMIT: ${{ needs.prepare.outputs.commit }}
          BUILD_DATE: ${{ needs.prepare.outputs.build_date }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          EXT: ${{ matrix.ext }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail

          NAME="tubo_${VERSION}_${GOOS}_${GOARCH}"
          BIN="tubo${EXT}"
          DIST_ROOT="dist"
          STAGE_DIR="${DIST_ROOT}/${NAME}"

          mkdir -p "$STAGE_DIR"

          GOOS="$GOOS" GOARCH="$GOARCH" CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags "-X p2p-api-tunnel/internal/version.ProductVersion=$TAG -X p2p-api-tunnel/internal/version.Commit=$COMMIT -X p2p-api-tunnel/internal/version.BuildDate=$BUILD_DATE" \
            -o "$STAGE_DIR/$BIN" \
            ./cmd/tubo

          if [ "$GOOS" = "linux" ] && [ "$GOARCH" = "amd64" ]; then
            VERSION_OUTPUT="$($STAGE_DIR/$BIN version)"
            printf '%s\n' "$VERSION_OUTPUT"
            grep -F "tubo $TAG" <<<"$VERSION_OUTPUT"
            grep -F "protocol 1.1" <<<"$VERSION_OUTPUT"
            grep -F "commit $COMMIT" <<<"$VERSION_OUTPUT"
            grep -F "build_date $BUILD_DATE" <<<"$VERSION_OUTPUT"
          fi

          case "$ARCHIVE" in
            tar.gz)
              tar -C "$DIST_ROOT" -czf "$DIST_ROOT/${NAME}.tar.gz" "$NAME"
              ;;
            zip)
              python3 -m zipfile -c "$DIST_ROOT/${NAME}.zip" "$DIST_ROOT/$NAME"
              ;;
            *)
              echo "unsupported archive format: $ARCHIVE" >&2
              exit 1
              ;;
          esac

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  checksums:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Generate SHA256SUMS.txt
        run: |
          set -euo pipefail
          cd release
          find . -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -printf '%f\n' | LC_ALL=C sort | xargs sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: release/SHA256SUMS.txt
          if-no-files-found: error

  publish:
    needs: [prepare, checksums]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Create or update GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; replacing release assets"
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi

          gh release upload "$TAG" release/* --clobber
          gh release view "$TAG" --json url --jq .url
